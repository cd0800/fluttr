<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluttr - Butterfly Catalogue</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#303943">
</head>

<body>

<header>
  <div class="logo"><a href="index.html" aria-label="Fluttr home"><img class="animation" src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Butterfly_o_Mariposa.gif" alt="Fluttr logo"><span>FLUTTR</span></a></div>
  <nav>
    <a href="search.html">Search</a>
    <a href="submit.html">Submit</a>
    <a href="about.html">About</a>
    <a href="accessibility.html">Accessibility</a>
    <a href="signin.html" class="signin" id="signinLink">Sign in</a>
    <span class="user-greeting" id="userGreeting" aria-live="polite"></span>
    <button type="button" class="link-button" id="signoutBtn">Sign out</button>
  </nav>
</header>

<main class="search-page">
  <section class="search-hero">
    <h1>Search Butterflies</h1>
    <p>Explore our database of Australian butterfly species</p>
  </section>

  <section class="search-layout">
    <aside class="filters">
      <h2>Filters</h2>
      <input type="text" id="searchBox" placeholder="Search butterflies...">
      <details class="filter-group" data-filter="family">
        <summary>Family</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="familyFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="tribe">
        <summary>Tribe</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="tribeFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="genus">
        <summary>Genus</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="genusFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="location">
        <summary>Location</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="locationFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="size">
        <summary>Size</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="sizeFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="food_plant">
        <summary>Food plant</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="foodPlantFilter" class="checkbox-list"></div>
      </details>

      <details class="filter-group" data-filter="colouring">
        <summary>Colouring</summary>
        <div class="filter-actions">
          <button type="button" data-action="select-all">Select all</button>
          <button type="button" data-action="clear-all">Clear all</button>
        </div>
        <div id="colouringFilter" class="checkbox-list"></div>
      </details>
    </aside>

    <section>
      <div id="results" class="results-grid"></div>
    </section>
  </section>
</main>

<footer>
  <div class="footer-links">
    <a href="#">About us</a>
    <a href="#">Contact us</a>
    <a href="#">Sign in</a>
    <a href="#">Submitting guide</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
  </div>
  <br>
  <p>©2026 FLUTTR. All rights reserved.</p>
</footer>

<script src="search.js"></script>
<script src="auth.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>

</body>
</html>
